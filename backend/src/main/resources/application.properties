# ===============================================================
# Underground Terminal API - Application Configuration
# ===============================================================
# This is the BASE configuration. Profile-specific overrides:
#   dev     -> application-dev.properties     (H2 in-memory)
#   staging -> application-staging.properties (MySQL staging)
#   prod    -> application-prod.properties    (MySQL production)
#   render  -> application-render.properties  (PostgreSQL for Render)
#
# Activate a profile:
#   --spring.profiles.active=dev
#   SPRING_PROFILES_ACTIVE=render (environment variable)
# ===============================================================

# Default profile is 'dev' for local development with H2
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===============================================================
# SHARED CONFIGURATION (applies to all profiles unless overridden)
# ===============================================================

# Server Configuration
server.port=${PORT:8080}

# JPA Configuration (base - overridden per profile)
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN

# JWT Configuration (base - should be overridden in prod/render)
jwt.secret=${JWT_SECRET:UndergroundTerminalSecretKey2024!@#$%^&*()_+}
jwt.expiration=${JWT_EXPIRATION:86400000}

# OpenAPI Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS Configuration (override per environment)
spring.web.cors.allowed-origins=${CORS_ORIGINS:*}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Logging (default level)
logging.level.com.undergroundterminal=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.web=WARN
