# ===============================================================
# RENDER PROFILE - PostgreSQL Database (Render managed service)
# ===============================================================
# Activate with: --spring.profiles.active=render
# or set SPRING_PROFILES_ACTIVE=render
#
# Render provides PostgreSQL via JDBC_DATABASE_URL env var.
# ===============================================================

# Server Configuration
server.port=${PORT:8080}

# PostgreSQL Database Configuration (Render provides JDBC_DATABASE_URL)
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (production tuning)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA Configuration (PostgreSQL dialect)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Data initialization (for demo deployment with seed data)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.platform=postgresql
spring.sql.init.data-locations=classpath:data-postgresql.sql

# JWT Configuration (REQUIRED: set via environment variables)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# OAuth2 Google Configuration (REQUIRED: set via environment variables)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email

# OpenAPI Documentation (disabled in production)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# CORS Configuration (REQUIRED: set specific origins in production)
spring.web.cors.allowed-origins=${CORS_ORIGINS}

# Logging
logging.level.com.undergroundterminal=WARN
logging.level.org.springframework.web=ERROR
logging.level.org.springframework.security=ERROR
logging.file.name=logs/underground-terminal.log
logging.file.max-size=10MB
logging.file.max-history=7
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
