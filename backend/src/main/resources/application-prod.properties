# ===============================================================
# PRODUCTION PROFILE - MySQL Database (production deployment)
# ===============================================================
# Activate with: --spring.profiles.active=prod
# or set SPRING_PROFILES_ACTIVE=prod

# Server Configuration
server.port=${PORT:8080}

# MySQL Database Configuration (production instance - all via env vars)
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:underground_terminal_prod}?useSSL=true&requireSSL=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Connection Pool (production tuning)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration (REQUIRED: set via environment variables)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# OAuth2 Google Configuration (REQUIRED: set via environment variables)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email

# OpenAPI Documentation (disabled in production)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# CORS Configuration (REQUIRED: set specific origins in production)
spring.web.cors.allowed-origins=${CORS_ORIGINS}

# Logging
logging.level.com.undergroundterminal=WARN
logging.level.org.springframework.web=ERROR
logging.level.org.springframework.security=ERROR
logging.file.name=logs/underground-terminal.log
logging.file.max-size=10MB
logging.file.max-history=7
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
