# ===============================================================
# STAGING PROFILE - MySQL Database (pre-production testing)
# ===============================================================
# Activate with: --spring.profiles.active=staging
# or set SPRING_PROFILES_ACTIVE=staging

# Server Configuration
server.port=8080

# MySQL Database Configuration (staging instance)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:underground_terminal_staging}?createDatabaseIfNotExist=true&useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:staging_user}
spring.datasource.password=${DB_PASSWORD:staging_password}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Initialize data on startup (only for initial setup)
spring.sql.init.mode=never

# JWT Configuration
jwt.secret=${JWT_SECRET:StagingJwtSecretKey2024!ChangeMeInProduction}
jwt.expiration=86400000

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# OpenAPI Documentation (disabled in staging)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.enabled=false

# CORS Configuration
spring.web.cors.allowed-origins=${CORS_ORIGINS:*}

# Logging
logging.level.com.undergroundterminal=INFO
logging.level.org.springframework.web=WARN
